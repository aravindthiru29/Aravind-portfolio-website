{% extends "base.html" %}

{% block title %}Blog Post - Aravind{% endblock %}

{% block content %}
<!-- Page Header -->
<section class="v2-section pt-200 bg-darker">
    <div class="container text-center">
        <div class="text-red fw-bold mb-3">{{ post.category }} • {{ post.date }}</div>
        <h1 class="display-3 fw-black" data-aos="fade-up">{{ post.title }}</h1>
    </div>
</section>

<!-- Blog Post Layout -->
<section class="v2-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8" data-aos="fade-up">
                {% if post.image %}
                <img src="{{ post.image if post.image.startswith('/') or post.image.startswith('http') else url_for('static', filename=post.image.replace('img/uploads/', '../uploads/') if 'img/uploads/' in post.image else post.image) }}" alt="{{ post.title }}" class="img-fluid rounded-4 shadow-lg mb-5 w-100">
                {% endif %}
                <div class="blog-content fs-5 text-gray lh-lg" style="white-space: pre-wrap;">
                    {{ post.body }}
                </div>
                {% if post.image2 %}
                <img src="{{ post.image2 if post.image2.startswith('/') or post.image2.startswith('http') else url_for('static', filename=post.image2.replace('img/uploads/', '../uploads/') if 'img/uploads/' in post.image2 else post.image2) }}" alt="{{ post.title }} - Image 2" class="img-fluid rounded-4 shadow-lg mt-5 mb-5 w-100">
                {% endif %}
                
                <!-- Comments Placeholder -->
                <div class="mt-100 p-5 bg-darker rounded-4">
                    <h4 class="mb-4">LEAVE A REPLY</h4>
                    <form>
                        <textarea class="form-control-v2 mb-4" rows="4" placeholder="YOUR COMMENT"></textarea>
                        <button class="v2-btn py-2 px-5 shadow-sm">POST COMMENT</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block head %}
<style>
    .italic { font-style: italic; }
</style>
{% endblock %}
